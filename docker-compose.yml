version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mitra-db
    environment:
      POSTGRES_DB: mitra
      POSTGRES_USER: mitra
      POSTGRES_PASSWORD: mitra
    ports:
      - "5432:5432"
    volumes:
      - mitra-pgdata:/var/lib/postgresql/data

  app:
    build:
      context: ./mitra/mitra
      dockerfile: Dockerfile
    container_name: mitra-app
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mitra
      SPRING_DATASOURCE_USERNAME: mitra
      SPRING_DATASOURCE_PASSWORD: mitra
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-minimum-32-chars}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not-set}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-not-set}
    ports:
      - "8080:8080"

volumes:
  mitra-pgdata:
